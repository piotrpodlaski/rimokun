#        excessivePositionDeviationAlarm: 700
  Machine:
    loopIntervalMS: 60
    updateIntervalMS: 200
    commandQueueMaxSize: 16  # max pending commands; excess are rejected with an error response
    motion:
      stepsPerRevolution: 1000
      neutralAxisActivationThreshold: 0.05
      speedUpdateAxisDeltaThreshold: 0.02
      autoLockTimeoutMs: 5000
      axes:
        leftArmX:
          invertAxis: true
          slowMaxLinearSpeedMmPerSec: &slowSpeedX 50.0
          fastMaxLinearSpeedMmPerSec: &fastSpeedX 350.0
          stepsPerMm: &stepsMmX 14.15
          slowAcceleration001MsPerKHz: &slowAccel 100000
          slowDeceleration001MsPerKHz: &slowDeccel 100000
          fastAcceleration001MsPerKHz: &fastAccel 50000
          fastDeceleration001MsPerKHz: &fastDeccel 50000
        leftArmY:
          invertAxis: true
          slowMaxLinearSpeedMmPerSec: &slowSpeedY 30.0
          fastMaxLinearSpeedMmPerSec: &fastSpeedY 200.0
          stepsPerMm: &stepsMmY 20
          slowAcceleration001MsPerKHz: *slowAccel
          slowDeceleration001MsPerKHz: *slowDeccel
          fastAcceleration001MsPerKHz: *fastAccel
          fastDeceleration001MsPerKHz: *fastDeccel
        rightArmX:
          invertAxis: false
          slowMaxLinearSpeedMmPerSec: *slowSpeedX
          fastMaxLinearSpeedMmPerSec: *fastSpeedX
          stepsPerMm: *stepsMmX
          slowAcceleration001MsPerKHz: *slowAccel
          slowDeceleration001MsPerKHz: *slowDeccel
          fastAcceleration001MsPerKHz: *fastAccel
          fastDeceleration001MsPerKHz: *fastDeccel
        rightArmY:
          invertAxis: false
          slowMaxLinearSpeedMmPerSec: *slowSpeedY
          fastMaxLinearSpeedMmPerSec: *fastSpeedY
          stepsPerMm: *stepsMmY
          slowAcceleration001MsPerKHz: *slowAccel
          slowDeceleration001MsPerKHz: *slowDeccel
          fastAcceleration001MsPerKHz: *fastAccel
          fastDeceleration001MsPerKHz: *fastDeccel
        gantryZ:
          invertAxis: false
          slowMaxLinearSpeedMmPerSec: 150.0
          fastMaxLinearSpeedMmPerSec: 500.0
          stepsPerMm: *stepsMmX
          slowAcceleration001MsPerKHz: *slowAccel
          slowDeceleration001MsPerKHz: *slowDeccel
          fastAcceleration001MsPerKHz: *fastAccel
          fastDeceleration001MsPerKHz: *fastDeccel
    inputMapping:
      safetyON : 8
      button1 : 9
      button2 : 10
      tclProx : 0
      tclOpen : 2
      tclClose: 3
      tcrProx: 4
      tcrOpen: 5
      tcrClose: 6
    outputMapping:
      toolChangerLeft: 0
      toolChangerRight: 1
      light1 : 2
      light2 : 3
