site_name: rimokun
site_description: Documentation for a complete software solution with a GUI, a server, and command/status interfaces between them.
site_url: https://piotrpodlaski.github.io/rimokun/
repo_url: https://github.com/piotrpodlaski/rimokun
repo_name: piotrpodlaski/rimokun

theme:
  name: material
  logo: assets/images/rimokun-logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.view
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Configuration: configuration.md
  - GUI: gui.md
  - Server: server.md
  - Interfaces: interfaces.md
  - Operation: operation.md
  - Troubleshooting: troubleshooting.md
  - Development: development.md
  - Class Reference: classes.md
  - FAQ: faq.md
