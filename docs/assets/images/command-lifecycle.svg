  <text x="108" y="390" fill="#102033" font-family="Arial, sans-serif" font-size="18" font-weight="700">Interpretation</text>
  <text x="108" y="424" fill="#385166" font-family="Arial, sans-serif" font-size="18">• A command response confirms intake and validation.</text>
  <text x="108" y="452" fill="#385166" font-family="Arial, sans-serif" font-size="18">• Status updates confirm whether motion, tool change, or clamp interaction actually converged to the expected machine state.</text>
